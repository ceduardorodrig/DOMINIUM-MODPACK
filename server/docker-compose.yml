services:
  crafty:
    image: registry.gitlab.com/crafty-controller/crafty-4:latest
    container_name: crafty-controller
    # Hora do container = mesma regiao (horario de Brasilia)
    environment:
      - TZ=America/Sao_Paulo
    ports:
      - "8443:8443"              # Web UI (HTTPS)
      - "25565:25565"            # Minecraft Server Port
      - "24454:24454/udp"      # Simple Voice Chat
      # RCON apenas no host local (nao expor na rede / Tailscale)
      - "127.0.0.1:25575:25575"
    volumes:
      - ../crafty/config:/crafty/app/config
      - ../crafty/backups:/crafty/backups
      - ../crafty/import:/crafty/import
      # Vincula a pasta atual como o servidor "dominium" no Crafty
      - ./:/crafty/servers/dominium
      # Destino de backup no HDD Linux montado para o mod AdvancedBackups
      - "/mnt/HDD_SATA/minecraftserver [dominium-backup]:/minecraft-backups:rw"
    restart: unless-stopped

